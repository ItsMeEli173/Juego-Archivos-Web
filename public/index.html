<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latam Simulator 3D Prime Pro Max</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="game-container"></div>
    
    <div id="main-menu">
        <h1>JUEGO DE ESPADAS</h1>
        
        <div id="screen-main" class="menu-box">
            <input type="text" id="player-name-input" placeholder="Tu Nombre..." maxlength="12" style="width: 80%; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: none;">
            <button id="btn-go-create">Crear Partida</button>
            <button id="btn-go-join">Unirse a Partida</button>
        </div>

        <div id="screen-create" class="menu-box hidden">
            <h2>Selecciona el Modo</h2>
            <button id="btn-host-ffa">Todos contra Todos</button>
            <button id="btn-host-siege">Asedio (50 Kills)</button>
            <button class="btn-back">Volver</button>
        </div>

        <div id="screen-join" class="menu-box hidden">
            <h2>Partidas Disponibles</h2>
            <div id="room-list" style="max-height: 250px; overflow-y: auto; margin-bottom: 20px;">
                </div>
            <button id="btn-refresh-rooms">Actualizar Lista</button>
            <button class="btn-back">Volver</button>
        </div>

        <div id="screen-lobby" class="menu-box hidden">
            <h2>Lobby de Espera</h2>
            <p style="font-size: 1.2rem; margin-bottom: 5px;">Modo: <span id="lobby-mode-text" style="color: #ffcc00;">---</span></p>
            <p style="font-size: 1.2rem; margin-bottom: 15px;">Jugadores en sala: <span id="lobby-count" style="color: #0088ff; font-weight: bold;">1</span></p>

            <div id="team-selector" style="margin-bottom: 20px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px;">
                <h3 style="margin-top: 0; font-size: 1.1rem;">Elige tu Bando:</h3>
                <label style="display: block; margin: 8px 0; cursor: pointer; color: #ff8800; font-weight: bold;">
                    <input type="radio" name="team-choice" value="attacker" checked> ⚔️ Atacantes
                </label>
                <label style="display: block; margin: 8px 0; cursor: pointer; color: #0088ff; font-weight: bold;">
                    <input type="radio" name="team-choice" value="defender"> 🛡️ Defensores
                </label>
            </div>

            <p id="lobby-status" style="margin-bottom: 20px;">Esperando al anfitrión...</p>
            
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="btn-start-match" class="hidden" style="width: auto; margin: 0;">INICIAR</button>
                <button id="btn-leave-lobby" class="btn-back" style="width: auto; margin: 0; background-color: #cc0000; border-color: #cc0000;">Salir de la Sala</button>
            </div>
        </div>
    </div>

    <div id="hud-layer">
        <button id="btn-pause">⏸ Pausa</button>
        <div id="health-container">
            <div id="health-bar"></div>
        </div>
        <div id="stats-container">
            <span id="ui-kills">Kills: 0</span>
            <span id="ui-timer">00:00</span>
        </div>
        <canvas id="minimap" width="150" height="150"></canvas>0
    </div>

    <div id="ui-layer">
        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>
        <div id="action-buttons">
            <button id="btn-jump">Saltar</button>
            <button id="btn-block">Escudo</button>
            <button id="btn-attack">Atacar</button>
        </div>
    </div>

    <div id="game-over-screen" class="hidden">
        <h1 id="end-title">¡TIEMPO AGOTADO!</h1>
        
        <div style="display: flex; flex-direction: row; align-items: flex-start; gap: 40px; justify-content: center;">
            
            <div class="leaderboard-box">
                </div>

            <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 10px;">
                <button id="btn-restart">Volver a Jugar</button>
                <button id="btn-menu">Volver al Menú</button>
            </div>

        </div>
    </div>
    <div id="pause-menu" class="hidden">
        <h1>PARTIDA EN CURSO</h1>
        <p>El juego no se detiene en modo multijugador.</p>
        <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 30px;">
            <button id="btn-resume" class="menu-btn">Continuar</button>
            <button id="btn-leave-match" class="menu-btn leave-btn">Abandonar Partida</button>
        </div>
    </div>
    <div id="modal-msg" class="hidden">
        <div class="modal-content">
            <h2 id="modal-title">AVISO</h2>
            <p id="modal-body">El anfitrión ha cerrado la sala.</p>
            <button id="btn-modal-ok">Aceptar</button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
